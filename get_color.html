<!DOCTYPE html>
<html>

<body>
    <img id="logo" src="mds_navbar_dark.webp" style="display:none;" />
    <div id="result" style="font-size: 48px; font-weight: bold;">WAITING</div>
    <script>
        window.onload = function () {
            const img = document.getElementById('logo');
            const canvas = document.createElement('canvas');
            canvas.width = img.width;
            canvas.height = img.height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0);
            const data = ctx.getImageData(0, 0, 1, 1).data;
            const hex = '#' + [data[0], data[1], data[2]].map(x => x.toString(16).padStart(2, '0')).join('');
            document.getElementById('result').innerText = hex;
            // also print to console for safety
            console.log('HEX COLOR:', hex);
        };
    </script>
</body>

</html>
